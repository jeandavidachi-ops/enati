<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chess Rook - Black outline on white background -->
  <!-- Base -->
  <ellipse cx="100" cy="180" rx="40" ry="15" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Main body -->
  <rect x="65" y="140" width="70" height="40" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Upper body -->
  <rect x="70" y="100" width="60" height="40" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Top section -->
  <rect x="75" y="60" width="50" height="40" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Battlements -->
  <rect x="70" y="40" width="10" height="20" fill="white" stroke="black" stroke-width="4"/>
  <rect x="85" y="40" width="10" height="20" fill="white" stroke="black" stroke-width="4"/>
  <rect x="100" y="40" width="10" height="20" fill="white" stroke="black" stroke-width="4"/>
  <rect x="115" y="40" width="10" height="20" fill="white" stroke="black" stroke-width="4"/>
  <rect x="130" y="40" width="10" height="20" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Top platform -->
  <rect x="65" y="40" width="70" height="10" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Windows -->
  <rect x="75" y="110" width="10" height="15" fill="black" stroke="black" stroke-width="2"/>
  <rect x="115" y="110" width="10" height="15" fill="black" stroke="black" stroke-width="2"/>
  <rect x="80" y="70" width="8" height="12" fill="black" stroke="black" stroke-width="2"/>
  <rect x="112" y="70" width="8" height="12" fill="black" stroke="black" stroke-width="2"/>
</svg>
