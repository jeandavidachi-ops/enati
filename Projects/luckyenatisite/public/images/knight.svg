<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chess Knight - Black outline on white background -->
  <!-- Base -->
  <ellipse cx="100" cy="180" rx="40" ry="15" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Main body -->
  <path d="M60 180 L70 140 Q80 120 100 115 Q120 120 130 140 L140 180 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Upper body -->
  <path d="M70 140 L80 100 Q90 80 100 75 Q110 80 120 100 L130 140 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Neck -->
  <path d="M80 100 L85 80 Q90 70 100 70 Q110 70 115 80 L120 100 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Head -->
  <path d="M85 80 L90 60 Q95 50 100 50 Q105 50 110 60 L115 80 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Horse head details -->
  <path d="M90 60 L95 45 Q100 40 105 45 L110 60 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M95 45 L97 35 Q100 30 103 35 L105 45 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Mane -->
  <path d="M80 80 L75 70 L80 60 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M120 80 L125 70 L120 60 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Eye -->
  <circle cx="97" cy="55" r="3" fill="black" stroke="black" stroke-width="2"/>
</svg>
