<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="swordGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#654321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2c1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="guardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffb347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    <filter id="swordShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  
  <!-- Sword 1 (diagonal from top-left to bottom-right) -->
  <!-- Blade -->
  <path d="M 30 30 L 170 170" stroke="url(#swordGradient)" stroke-width="8" stroke-linecap="round" filter="url(#swordShadow)"/>
  
  <!-- Sword 1 Guard -->
  <ellipse cx="100" cy="100" rx="25" ry="8" fill="url(#guardGradient)" stroke="#333" stroke-width="1" transform="rotate(45 100 100)"/>
  
  <!-- Sword 1 Handle -->
  <path d="M 170 170 L 185 185" stroke="url(#handleGradient)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Sword 1 Pommel -->
  <circle cx="185" cy="185" r="4" fill="url(#guardGradient)" stroke="#333" stroke-width="1"/>
  
  <!-- Sword 2 (diagonal from top-right to bottom-left) -->
  <!-- Blade -->
  <path d="M 170 30 L 30 170" stroke="url(#swordGradient)" stroke-width="8" stroke-linecap="round" filter="url(#swordShadow)"/>
  
  <!-- Sword 2 Guard -->
  <ellipse cx="100" cy="100" rx="25" ry="8" fill="url(#guardGradient)" stroke="#333" stroke-width="1" transform="rotate(-45 100 100)"/>
  
  <!-- Sword 2 Handle -->
  <path d="M 30 170 L 15 185" stroke="url(#handleGradient)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Sword 2 Pommel -->
  <circle cx="15" cy="185" r="4" fill="url(#guardGradient)" stroke="#333" stroke-width="1"/>
  
  <!-- Center gem -->
  <circle cx="100" cy="100" r="6" fill="#ff0000" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="100" r="4" fill="#ff6666"/>
  
  <!-- Blade details -->
  <path d="M 35 35 L 165 165" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 165 35 L 35 165" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Handle details -->
  <path d="M 175 175 L 190 190" stroke="#654321" stroke-width="2" stroke-linecap="round"/>
  <path d="M 25 175 L 10 190" stroke="#654321" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Guard details -->
  <ellipse cx="100" cy="100" rx="20" ry="6" fill="none" stroke="#ff8c00" stroke-width="1" transform="rotate(45 100 100)"/>
  <ellipse cx="100" cy="100" rx="20" ry="6" fill="none" stroke="#ff8c00" stroke-width="1" transform="rotate(-45 100 100)"/>
</svg>
