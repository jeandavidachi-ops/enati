<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Images Test - ENATI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .token-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #333;
        }
        .token-info {
            flex: 1;
        }
        .token-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .token-address {
            color: #888;
            font-size: 14px;
            word-break: break-all;
        }
        .loading {
            color: #f97316;
        }
        .error {
            color: #ef4444;
        }
        .success {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Token Images Test</h1>
        <p>Testing token image loading from DexScreener API</p>
        
        <div id="test-results">
            <!-- Test results will be displayed here -->
        </div>
    </div>

    <script>
        // Test contract addresses
        const testAddresses = [
            'BAthuAsTa3orfbbXrjNjs39VUmZNU6JFwsSMkGjpump',
            'So11111111111111111111111111111111111111112', // Wrapped SOL
            'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v', // USDC
            'invalid-address-test'
        ];

        async function testTokenImage(contractAddress) {
            const testItem = document.createElement('div');
            testItem.className = 'test-item';
            testItem.innerHTML = `
                <img src="images/avatar-purple-orange.png" alt="Token" class="token-image" id="img-${contractAddress}">
                <div class="token-info">
                    <div class="token-name">Testing: ${contractAddress.substring(0, 10)}...</div>
                    <div class="token-address">${contractAddress}</div>
                    <div class="status loading">Loading...</div>
                </div>
            `;
            
            document.getElementById('test-results').appendChild(testItem);
            
            try {
                const response = await fetch(`/api/token-image/${encodeURIComponent(contractAddress)}`);
                const result = await response.json();
                
                const statusElement = testItem.querySelector('.status');
                const imageElement = testItem.querySelector('.token-image');
                
                if (result.success) {
                    statusElement.textContent = `Success: ${result.token_name} (${result.token_symbol})`;
                    statusElement.className = 'status success';
                    imageElement.src = result.image_url;
                    
                    // Add error handling for image loading
                    imageElement.onerror = function() {
                        this.src = 'images/avatar-purple-orange.png';
                        statusElement.textContent = 'Error: Failed to load image';
                        statusElement.className = 'status error';
                    };
                } else {
                    statusElement.textContent = `Error: ${result.error}`;
                    statusElement.className = 'status error';
                }
            } catch (error) {
                const statusElement = testItem.querySelector('.status');
                statusElement.textContent = `Network Error: ${error.message}`;
                statusElement.className = 'status error';
            }
        }

        // Run tests when page loads
        document.addEventListener('DOMContentLoaded', function() {
            testAddresses.forEach(address => {
                testTokenImage(address);
            });
        });
    </script>
</body>
</html>
