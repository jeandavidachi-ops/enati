<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chess King - Black outline on white background -->
  <!-- Base -->
  <ellipse cx="100" cy="180" rx="40" ry="15" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Main body -->
  <path d="M60 180 L70 140 Q80 120 100 115 Q120 120 130 140 L140 180 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Upper body -->
  <path d="M70 140 L80 100 Q90 80 100 75 Q110 80 120 100 L130 140 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Neck -->
  <rect x="85" y="75" width="30" height="25" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Crown base -->
  <ellipse cx="100" cy="70" rx="35" ry="10" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Crown points -->
  <path d="M65 70 L70 45 L75 70 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M75 70 L80 40 L85 70 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M85 70 L90 35 L95 70 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M95 70 L100 30 L105 70 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M105 70 L110 35 L115 70 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M115 70 L120 40 L125 70 Z" fill="white" stroke="black" stroke-width="4"/>
  <path d="M125 70 L130 45 L135 70 Z" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Cross on top -->
  <rect x="96" y="20" width="8" height="25" fill="black" stroke="black" stroke-width="2"/>
  <rect x="88" y="32" width="24" height="8" fill="black" stroke="black" stroke-width="2"/>
  
  <!-- Cross details -->
  <rect x="98" y="22" width="4" height="21" fill="white"/>
  <rect x="90" y="34" width="20" height="4" fill="white"/>
</svg>
