<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; }
  </style>
</helmet>
<div style="min-height:100vh;background:#070808;font-family:'Inter',sans-serif;padding:44px;box-sizing:border-box;">
  <div style="display:flex;align-items:center;justify-content:space-between;max-width:560px;margin-bottom:6px;">
    <div style="color:#ffffff;font-size:22px;font-weight:700;">Popular Groups</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#00e676;"></span>
      <span style="color:#8b9599;font-size:12px;font-weight:500;">Live</span>
    </div>
  </div>
  <div style="color:#8b9599;font-size:14px;margin-bottom:28px;">New calls reorder the board — risers overtake the groups above them.</div>

  <div style="position:relative;max-width:560px;height:{{ trackHeight }}px;transition:height .5s ease;">
    <sc-for list="{{ cards }}" as="c" hint-placeholder-count="6">
      <div style="{{ c.wrap }}">
        <div style="{{ c.card }}">
          <span style="{{ c.bar }}"></span>
          <div style="width:34px;text-align:center;flex-shrink:0;">
            <div style="color:{{ c.rankColor }};font-size:19px;font-weight:800;transition:color .3s ease;">{{ c.rankLabel }}</div>
          </div>
          <div style="width:60px;height:60px;border-radius:8px;background:{{ c.color }};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#0b0d0d;font-size:22px;font-weight:800;">{{ c.initial }}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="color:#fff;font-size:15px;font-weight:700;">{{ c.name }}</span>
              <span style="{{ c.delta }}">{{ c.deltaLabel }}</span>
            </div>
            <div style="display:flex;gap:30px;margin-top:11px;">
              <div><div style="color:#8b9599;font-size:10.5px;">PnL</div><div style="color:#00e676;font-size:14px;font-weight:700;margin-top:3px;">{{ c.pnl }}%</div></div>
              <div><div style="color:#8b9599;font-size:10.5px;">Best Call</div><div style="color:#fff;font-size:14px;font-weight:700;margin-top:3px;">{{ c.best }}x</div></div>
              <div><div style="color:#8b9599;font-size:10.5px;">Total Calls</div><div style="{{ c.callsStyle }}">{{ c.calls }}</div></div>
            </div>
          </div>
        </div>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const seed = [
      { id: "hot", name: "Hotlabs",  initial: "H", color: "#8bd4a8", pnl: 38, best: 11061, calls: 66 },
      { id: "trench", name: "Trench chat", initial: "T", color: "#d9cf8b", pnl: 33, best: 6,   calls: 52 },
      { id: "ceezy", name: "CEEZY 2", initial: "C", color: "#c7c7c7", pnl: 71, best: 42,  calls: 48 },
      { id: "gem", name: "Gem Lab",   initial: "G", color: "#8bc5d4", pnl: 58, best: 71,  calls: 44 },
      { id: "moon", name: "Moon Hunters", initial: "M", color: "#b7a8d4", pnl: 49, best: 43, calls: 40 },
      { id: "alpha", name: "Alpha Wolves", initial: "A", color: "#d4a88b", pnl: 64, best: 96, calls: 36 },
    ];
    this.state = { groups: seed, flash: {} };
    this.rowH = 92; this.gap = 14;
  }
  componentDidMount() {
    this.timer = setInterval(() => this.tick(), 1900);
  }
  componentWillUnmount() { clearInterval(this.timer); if (this.ft) clearTimeout(this.ft); }

  tick() {
    const groups = this.state.groups.map(g => ({ ...g }));
    // rank BEFORE update
    const before = this.rankMap(groups);
    // new calls arrive on 2-3 random groups
    const n = 2 + Math.floor(Math.random() * 2);
    const picks = [...groups].sort(() => Math.random() - 0.5).slice(0, n);
    picks.forEach(p => {
      const g = groups.find(x => x.id === p.id);
      g.calls += 4 + Math.floor(Math.random() * 16);
      g.pnl = Math.max(0, Math.min(100, g.pnl + (Math.floor(Math.random() * 9) - 3)));
      if (Math.random() > 0.6) g.best += Math.floor(Math.random() * 20);
    });
    const after = this.rankMap(groups);
    const flash = {};
    groups.forEach(g => {
      const d = before[g.id] - after[g.id]; // >0 moved up
      if (d > 0) flash[g.id] = "up";
      else if (d < 0) flash[g.id] = "down";
    });
    this.setState({ groups, flash });
    if (this.ft) clearTimeout(this.ft);
    this.ft = setTimeout(() => this.setState({ flash: {} }), 1100);
  }

  rankMap(groups) {
    const order = [...groups].sort((a, b) => b.calls - a.calls || b.pnl - a.pnl);
    const m = {};
    order.forEach((g, i) => { m[g.id] = i; });
    return m;
  }

  renderVals() {
    const { groups, flash } = this.state;
    const ranks = this.rankMap(groups);
    const step = this.rowH + this.gap;
    const cards = groups.map(g => {
      const rank = ranks[g.id];
      const fl = flash[g.id];
      const barColor = fl === "up" ? "#00e676" : fl === "down" ? "#ff3b24" : "transparent";
      const rankColor = rank === 0 ? "#00e676" : "#5f6d72";
      return {
        id: g.id, name: g.name, initial: g.initial, color: g.color,
        pnl: g.pnl, best: g.best, calls: g.calls,
        rankLabel: (rank + 1),
        rankColor,
        wrap: "position:absolute;left:0;right:0;top:0;transform:translateY(" + (rank * step) + "px);transition:transform .62s cubic-bezier(.34,1.2,.4,1),z-index 0s;z-index:" + (fl ? 5 : 1) + ";",
        card: "position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;height:" + this.rowH + "px;padding:0 20px 0 16px;box-sizing:border-box;background:#101314;border:1px solid " + (fl ? (fl === "up" ? "#1f5c3a" : "#5c2420") : "#253036") + ";border-radius:8px;transition:border-color .5s ease;",
        bar: "position:absolute;left:0;top:0;bottom:0;width:3px;background:" + barColor + ";transition:background .4s ease;",
        delta: "display:" + (fl === "up" ? "inline-flex" : "none") + ";align-items:center;gap:3px;color:#00e676;font-size:11px;font-weight:700;",
        deltaLabel: fl === "up" ? "▲ moved up" : "",
        callsStyle: "color:" + (fl === "up" ? "#00e676" : "#fff") + ";font-size:14px;font-weight:700;margin-top:3px;transition:color .4s ease;",
      };
    });
    return { cards, trackHeight: groups.length * step - this.gap };
  }
}
</script>
</body>
</html>
