<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Versus Group Filters</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <section class="modal" aria-label="Group filters">
      <header class="modal-header">
        <div class="header-left">
          <div class="header-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 7h10M18 7h2M4 17h2M10 17h10M4 12h4M12 12h8"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="17" r="2"/><circle cx="10" cy="12" r="2"/></svg>
          </div>
          <div>
            <h1>Filters</h1>
            <p>Find the perfect groups for you</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="clear" type="button">Clear all</button>
          <button class="close" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
      </header>

      <div class="grid">
        <div class="column">
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><path d="M13 2L5 13h6l-1 9 8-12h-6l1-8Z"/></svg>
            <span>Most Active</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>
            <span>Active Today</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><path d="M8.5 8.5a5 5 0 0 0 0 7M15.5 8.5a5 5 0 0 1 0 7M5.5 5.5a9 9 0 0 0 0 13M18.5 5.5a9 9 0 0 1 0 13"/><circle cx="12" cy="12" r="1.6"/></svg>
            <span>Live Now</span><i></i>
          </button>
        </div>

        <div class="column">
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3 20v-2c0-2.8 2.7-5 6-5s6 2.2 6 5v2M16 11c2.3 0 4 1.6 4 3.7V18M16 5.5a2.5 2.5 0 0 1 0 5"/></svg>
            <span>Most Members</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
            <span>Public Groups</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3M12 14v3"/></svg>
            <span>Private Groups</span><i></i>
          </button>
        </div>

        <div class="column">
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><path d="M4 17l6-6 4 4 6-7M15 8h5v5"/></svg>
            <span>Fastest Growing</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><path d="M4 17l6-6 4 4 6-7M15 8h5v5"/></svg>
            <span>Highest Win Rate</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><path d="M8 4h8v4a4 4 0 0 1-8 0V4Z"/><path d="M8 6H5v2a3 3 0 0 0 3 3M16 6h3v2a3 3 0 0 1-3 3M12 12v5M8 20h8M9 17h6"/></svg>
            <span>Most Wins</span><i></i>
          </button>
        </div>

        <div class="column">
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="3"/><path d="M5 21v-2a7 7 0 0 1 14 0v2"/></svg>
            <span>0 – 100 Members</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3 20v-2c0-2.8 2.7-5 6-5s6 2.2 6 5v2M16 11c2.3 0 4 1.6 4 3.7V18M16 5.5a2.5 2.5 0 0 1 0 5"/></svg>
            <span>100 – 1K Members</span><i></i>
          </button>
          <button class="option" type="button">
            <svg class="option-icon circle-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/></svg>
            <span>All Sizes</span><i></i>
          </button>
        </div>
      </div>

      <footer class="footer">
        <button class="reset" type="button">
          <svg viewBox="0 0 24 24"><path d="M4 4v6h6M20 20v-6h-6"/><path d="M5.6 15a8 8 0 0 0 13.1 2.2L20 14M4 10l1.3-3.2A8 8 0 0 1 18.4 9"/></svg>
          <span>Reset filters</span>
        </button>
        <button class="apply" type="button"><span>Apply filters</span><b>0</b></button>
      </footer>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
