<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versus 1:1 Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <section class="card" aria-label="Blocks stats card">
      <img class="tile" src="blocks-tile.png" alt="Blocks" />

      <div class="content">
        <div class="title-row">
          <h1>Blocks</h1>
          <span>1d</span>
        </div>

        <div class="stats">
          <div class="stat pnl">
            <p>PnL</p>
            <strong>72%</strong>
          </div>
          <div class="stat best">
            <p>Best Call</p>
            <strong>952x</strong>
          </div>
          <div class="stat total">
            <p>Total Calls</p>
            <strong>795</strong>
          </div>
        </div>

        <div class="socials">
          <span class="x">𝕏</span>
          <span class="tg">◢</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
