<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versus Popular Filters</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="section tickers">
      <div class="copy">
        <h1>Popular Tickers</h1>
        <p>Discover the most scanned tokens on Versus.</p>
      </div>

      <div class="filter-row">
        <button class="chip chip-most-scanned">
          <svg viewBox="0 0 24 24" class="icon"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3Z"/><path d="M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3Z"/><path d="M8 13c-2.67 0-5 1.34-5 3v2h10v-2c0-1.66-2.33-3-5-3Z"/><path d="M16 13c-.62 0-1.2.08-1.73.23 1.08.78 1.73 1.77 1.73 2.77v2h5v-2c0-1.66-2.33-3-5-3Z"/></svg>
          <span>Most Scanned</span>
        </button>
        <button class="chip chip-latest">
          <svg viewBox="0 0 24 24" class="icon"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/><path d="M12 7v5l3 2"/></svg>
          <span>Latest Scan</span>
        </button>
        <button class="chip chip-market">
          <svg viewBox="0 0 24 24" class="icon"><circle cx="12" cy="12" r="9"/><path d="M12 6v12"/><path d="M15.2 8.5c-.8-.8-2-.9-3.2-.9-1.8 0-3 .8-3 2.2 0 3.2 6 1.5 6 4.7 0 1.4-1.3 2.2-3.2 2.2-1.5 0-2.7-.4-3.7-1.3"/></svg>
          <span>Market Cap</span>
        </button>
        <button class="chip chip-newest">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 2l2.8 6.2L21 11l-6.2 2.8L12 20l-2.8-6.2L3 11l6.2-2.8L12 2Z"/><path d="M19 3v4"/><path d="M17 5h4"/></svg>
          <span>Newest</span>
        </button>
        <button class="chip chip-oldest">
          <svg viewBox="0 0 24 24" class="icon"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/></svg>
          <span>Oldest</span>
        </button>

        <button class="chip filter-chip">
          <svg viewBox="0 0 24 24" class="icon"><path d="M4 5h16l-6 7v5l-4 2v-7L4 5Z"/></svg>
          <span>Filters</span>
        </button>
      </div>
    </section>

    <div class="divider"></div>

    <section class="section groups">
      <div class="copy">
        <h1>Popular Groups</h1>
        <p>Discover the most active and growing groups on Versus.</p>
      </div>

      <div class="filter-row">
        <button class="chip chip-top-ranked">
          <svg viewBox="0 0 24 24" class="icon"><path d="M8 4h8v4a4 4 0 0 1-8 0V4Z"/><path d="M8 6H5v2a3 3 0 0 0 3 3"/><path d="M16 6h3v2a3 3 0 0 1-3 3"/><path d="M12 12v5"/><path d="M8 20h8"/><path d="M9 17h6"/></svg>
          <span>Top Ranked</span>
        </button>
        <button class="chip chip-members">
          <svg viewBox="0 0 24 24" class="icon"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3Z"/><path d="M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3Z"/><path d="M8 13c-2.67 0-5 1.34-5 3v2h10v-2c0-1.66-2.33-3-5-3Z"/><path d="M16 13c-.62 0-1.2.08-1.73.23 1.08.78 1.73 1.77 1.73 2.77v2h5v-2c0-1.66-2.33-3-5-3Z"/></svg>
          <span>Most Members</span>
        </button>
        <button class="chip chip-new-groups">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 2l2.8 6.2L21 11l-6.2 2.8L12 20l-2.8-6.2L3 11l6.2-2.8L12 2Z"/><path d="M19 3v4"/><path d="M17 5h4"/></svg>
          <span>New Groups</span>
        </button>
        <button class="chip chip-active">
          <svg viewBox="0 0 24 24" class="icon"><path d="M13 2L5 13h6l-1 9 8-12h-6l1-8Z"/></svg>
          <span>Most Active</span>
        </button>
        <button class="chip chip-growing">
          <svg viewBox="0 0 24 24" class="icon"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>
          <span>Fastest Growing</span>
        </button>

        <button class="chip filter-chip">
          <svg viewBox="0 0 24 24" class="icon"><path d="M4 5h16l-6 7v5l-4 2v-7L4 5Z"/></svg>
          <span>Filters</span>
        </button>
      </div>
    </section>
  </main>
</body>
</html>
