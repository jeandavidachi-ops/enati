<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versus Rank Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="rank-card-wrap">
      <div class="rank-pill">
        <span class="dot"></span>
        <b>08</b>
        <em>•</em>
        <span>Ultra minimal</span>
      </div>

      <button class="rank-card" type="button" aria-label="Open @straightozero profile">
        <div class="avatar" aria-hidden="true">
          <div class="avatar-head"></div>
          <div class="avatar-body"></div>
        </div>

        <div class="content">
          <h3>@straightozero</h3>

          <div class="stats">
            <div class="stat">
              <strong class="blue">48</strong>
              <p>scans</p>
            </div>

            <div class="line"></div>

            <div class="stat">
              <strong class="green">31</strong>
              <p>wins</p>
            </div>

            <div class="line"></div>

            <div class="stat">
              <strong class="red">17</strong>
              <p>defeats</p>
            </div>
          </div>
        </div>

        <div class="arrow" aria-hidden="true">→</div>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
