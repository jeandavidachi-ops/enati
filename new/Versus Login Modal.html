<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Versus — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Kanit:ital,wght@1,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; background:#050507; }
  * { box-sizing:border-box; }
  @keyframes vs-chrome { from{background-position:50% 8%} to{background-position:50% 92%} }
  @keyframes vs-in { from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:translateY(0) scale(1)} }
  .chrome { color:transparent; -webkit-background-clip:text; background-clip:text;
    background-image:linear-gradient(180deg,#ffffff,#e6ebf1 28%,#8b96a4 49%,#5b6570 51%,#b3bcc7 55%,#f4f7fa 74%,#ffffff);
    background-size:100% 240%; }
  .auth-btn { padding:14px 18px; border-radius:13px; font-size:14px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:9px; font-family:'Inter',sans-serif;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.14); color:#f2f2f4;
    transition:background .15s, border-color .15s, transform .12s; }
  .auth-btn:hover { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.3); transform:translateY(-1px); }
  .auth-btn svg { width:19px; height:19px; flex:none; }
  .field { width:100%; padding:15px 17px; border-radius:13px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.13);
    color:#fff; font-size:15px; font-weight:500; outline:none; font-family:'Inter',sans-serif; transition:border-color .15s, background .15s; }
  .field::placeholder { color:rgba(255,255,255,.4); }
  .field:focus { border-color:rgba(255,255,255,.5); background:rgba(255,255,255,.08); }
  .btn-primary { width:100%; padding:16px; border-radius:13px; border:none; font-size:16px; font-weight:700; cursor:pointer;
    background:#f4f4f5; color:#0a0a0c; font-family:'Inter',sans-serif; transition:transform .12s, box-shadow .2s;
    display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 12px 28px -10px rgba(255,255,255,.5); }
  .legal { font-size:12px; color:rgba(255,255,255,.42); line-height:1.6; }
  .legal a, a.legal { color:rgba(255,255,255,.72); text-decoration:none; cursor:pointer; }
  .legal a:hover, a.legal:hover { text-decoration:underline; }
  .scrim { position:fixed; inset:0; background:rgba(4,4,7,.62);
    display:flex; align-items:center; justify-content:center; font-family:'Inter',system-ui,sans-serif; }
</style>
</head>
<body>

  <!-- dim/blur whatever page is behind; here just the scrim -->
  <div class="scrim">

    <!-- ===== modal ===== -->
    <div style="width:440px; border-radius:26px; padding:40px 40px 30px; position:relative;
      animation:vs-in .4s cubic-bezier(.2,.8,.3,1) both;
      background:radial-gradient(130% 120% at 50% 0%,#16171d 0%,#0c0d11 60%,#0a0b0e 100%);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 40px 100px -30px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.06);">

      <!-- close -->
      <button aria-label="Close" style="position:absolute; top:20px; right:20px; width:34px; height:34px;
        border-radius:10px; border:none; cursor:pointer; background:rgba(255,255,255,.06); color:#9a9da3;
        display:flex; align-items:center; justify-content:center;">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>

      <!-- logo + heading -->
      <div style="text-align:center;">
        <div class="chrome" style="font-family:'Kanit',sans-serif; font-weight:900; font-style:italic; font-size:44px; letter-spacing:-0.03em; animation:vs-chrome 4s ease-in-out infinite alternate;">VERSUS</div>
        <h1 style="font-family:'Archivo Black',sans-serif; font-size:24px; color:#f6f6f8; margin:18px 0 0; letter-spacing:-0.01em;">Welcome back</h1>
        <p style="color:#8a8d94; font-size:15px; margin:9px 0 0;">Log in to get back in the arena.</p>
      </div>

      <!-- social row -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:28px;">
        <button class="auth-btn"><svg viewBox="0 0 24 24" fill="#fff"><path d="M16.4 12.8c0-2.1 1.7-3.1 1.8-3.2-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.7-3.1.7-.6 0-1.6-.7-2.7-.7-1.4 0-2.6.8-3.3 2-.1.3-1.4 2.5-.4 5.2.5 1.3 1.1 2.8 2 2.8.8 0 1.1-.5 2.1-.5s1.2.5 2.1.5c.9 0 1.4-1.3 2-2.6.6-1 .9-1.9.9-2 0 0-1.7-.7-1.7-2.8ZM14.6 6.4c.5-.6.8-1.4.7-2.3-.7 0-1.6.5-2.1 1.1-.5.5-.9 1.4-.8 2.2.8.1 1.6-.4 2.2-1Z"/></svg>Apple</button>
        <button class="auth-btn"><svg viewBox="0 0 24 24"><path d="M21.6 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.4c-.2 1.2-.9 2.3-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.4Z" fill="#4285F4"/><path d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.7-5.6-4.1H3.1v2.6C4.7 19.8 8.1 22 12 22Z" fill="#34A853"/><path d="M6.4 13.9c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V7.5H3.1C2.4 8.9 2 10.4 2 12s.4 3.1 1.1 4.5l3.3-2.6Z" fill="#FBBC05"/><path d="M12 6c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 3.1 14.7 2 12 2 8.1 2 4.7 4.2 3.1 7.5l3.3 2.6C7.2 7.7 9.4 6 12 6Z" fill="#EA4335"/></svg>Google</button>
      </div>

      <div style="display:flex; align-items:center; gap:14px; margin:22px 0; color:rgba(255,255,255,.3); font-size:12px; font-weight:600;"><div style="flex:1; height:1px; background:rgba(255,255,255,.12);"></div>OR<div style="flex:1; height:1px; background:rgba(255,255,255,.12);"></div></div>

      <!-- fields -->
      <div style="display:flex; flex-direction:column; gap:13px;">
        <div>
          <label style="display:block; font-size:13px; font-weight:600; color:#b6b9c0; margin-bottom:7px;">Email address</label>
          <input class="field" placeholder="you@email.com" />
        </div>
        <div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;">
            <label style="font-size:13px; font-weight:600; color:#b6b9c0;">Password</label>
            <a class="legal" style="font-size:13px;">Forgot?</a>
          </div>
          <input class="field" type="password" placeholder="Enter your password" />
        </div>
      </div>

      <button class="btn-primary" style="margin-top:22px;">Log in <span style="font-family:'JetBrains Mono';">&rarr;</span></button>

      <div style="text-align:center; margin-top:22px; padding-top:20px; border-top:1px solid rgba(255,255,255,.08); font-size:14px; color:#8a8d94;">
        New to Versus? <a style="color:#fff; font-weight:600; text-decoration:none; cursor:pointer;">Create an account</a>
      </div>
    </div>
  </div>

</body>
</html>
